<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - 唐泉个人设计作品站</title>
    <style>
        body {
            background-color: #181818;
            color: #dbdbdb;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .error-container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 300;
            margin-bottom: 1rem;
            color: #1f1f1f;
        }
        
        .error-title {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            font-weight: 400;
        }
        
        .error-description {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            line-height: 1.6;
            opacity: 0.8;
        }
        
        .back-link {
            display: inline-block;
            padding: 12px 30px;
            background-color: #1f1f1f;
            color: #dbdbdb;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .back-link:hover {
            background-color: #2a2a2a;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">页面未找到</h1>
        <p class="error-description">
            您访问的页面可能已被移动、删除或暂时不可用。
            <br>
            请返回首页继续浏览我的设计作品。
        </p>
        <a href="./" class="back-link">返回首页</a>
    </div>
</body>
</html>
