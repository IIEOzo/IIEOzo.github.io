<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 | 唐泉个人设计作品站</title>
    <style>
        :root {
            --color-bg: #181818;
            --color-text: #dbdbdb;
            --color-accent: #dbdbdb;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .error-container {
            text-align: center;
            max-width: 600px;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: var(--color-accent);
            margin-bottom: 1rem;
            line-height: 1;
        }
        
        .error-title {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .error-message {
            font-size: 1.125rem;
            opacity: 0.8;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            background: transparent;
            color: var(--color-text);
            border: 1px solid var(--color-text);
            border-radius: 8px;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: var(--color-text);
            color: var(--color-bg);
        }
        
        .btn-primary {
            background: var(--color-accent);
            color: var(--color-bg);
            border-color: var(--color-accent);
        }
        
        .btn-primary:hover {
            background: var(--color-text);
            border-color: var(--color-text);
        }
        
        @media (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }
            
            .error-title {
                font-size: 1.5rem;
            }
            
            .error-message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">页面未找到</h2>
        <p class="error-message">
            抱歉，您访问的页面不存在或已被移动。
            请检查网址是否正确，或返回首页继续浏览。
        </p>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home" style="margin-right: 0.5rem;"></i>
                返回首页
            </a>
            <a href="/#work" class="btn">
                <i class="fas fa-palette" style="margin-right: 0.5rem;"></i>
                浏览作品
            </a>
            <a href="/#contact" class="btn">
                <i class="fas fa-envelope" style="margin-right: 0.5rem;"></i>
                联系我
            </a>
        </div>
    </div>
    
    <script>
        // 自动重定向逻辑
        const currentPath = window.location.pathname;
        
        // 尝试修复常见错误
        const commonErrors = {
            '/index': '/',
            '/home': '/',
            '/portfolio': '/#work',
            '/projects': '/#work',
            '/contact': '/#contact',
            '/about': '/#about'
        };
        
        if (commonErrors[currentPath]) {
            window.location.href = commonErrors[currentPath];
        }
        
        // 发送404错误到分析
        if (typeof gtag !== 'undefined') {
            gtag('event', '404_error', {
                'page_path': currentPath
            });
        }
    </script>
</body>
</html>
